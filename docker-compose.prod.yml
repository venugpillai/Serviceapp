version: "3.9"

services:
  db:
    image: postgres:16.11
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: bundle exec puma -C config/puma.rb
    depends_on:
      - db
    environment:
      RAILS_ENV: production
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root123
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
    ports:
      - "3000:3000"

volumes:
  postgres_data: