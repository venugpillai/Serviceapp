default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("POSTGRES_USER", "postgres") %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", "root123") %>
  host: <%= ENV.fetch("POSTGRES_HOST", "db") %>
  port: 5432

development:
  <<: *default
  database: service_app_development

test:
  <<: *default
  database: service_app_test

production:
  <<: *default
  database: service_app_production

cable:
  <<: *default
  database: service_app_cable

queue:
  <<: *default
  database: service_app_queue

cache:
  <<: *default
  database: service_app_cache